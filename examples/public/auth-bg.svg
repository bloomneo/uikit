<svg width="1920" height="1080" viewBox="0 0 1920 1080" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Main gradient background -->
  <rect width="1920" height="1080" fill="url(#mainGradient)"/>

  <!-- Overlay patterns -->
  <g opacity="0.3">
    <circle cx="300" cy="200" r="400" fill="url(#circleGradient1)"/>
    <circle cx="1500" cy="800" r="500" fill="url(#circleGradient2)"/>
    <circle cx="1000" cy="400" r="350" fill="url(#circleGradient3)"/>
  </g>

  <!-- Noise texture overlay -->
  <rect width="1920" height="1080" fill="url(#noisePattern)" opacity="0.05"/>

  <!-- Definitions -->
  <defs>
    <!-- Main gradient -->
    <linearGradient id="mainGradient" x1="0" y1="0" x2="1920" y2="1080" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#667eea"/>
      <stop offset="50%" stop-color="#764ba2"/>
      <stop offset="100%" stop-color="#f093fb"/>
    </linearGradient>

    <!-- Circle gradients -->
    <radialGradient id="circleGradient1">
      <stop offset="0%" stop-color="#4facfe" stop-opacity="0.8"/>
      <stop offset="100%" stop-color="#00f2fe" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="circleGradient2">
      <stop offset="0%" stop-color="#fa709a" stop-opacity="0.6"/>
      <stop offset="100%" stop-color="#fee140" stop-opacity="0"/>
    </radialGradient>

    <radialGradient id="circleGradient3">
      <stop offset="0%" stop-color="#a8edea" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#fed6e3" stop-opacity="0"/>
    </radialGradient>

    <!-- Noise pattern -->
    <pattern id="noisePattern" x="0" y="0" width="100" height="100" patternUnits="userSpaceOnUse">
      <rect width="100" height="100" fill="white"/>
      <circle cx="10" cy="10" r="1" fill="black" opacity="0.1"/>
      <circle cx="30" cy="25" r="1" fill="black" opacity="0.1"/>
      <circle cx="50" cy="15" r="1" fill="black" opacity="0.1"/>
      <circle cx="70" cy="35" r="1" fill="black" opacity="0.1"/>
      <circle cx="90" cy="20" r="1" fill="black" opacity="0.1"/>
      <circle cx="20" cy="50" r="1" fill="black" opacity="0.1"/>
      <circle cx="40" cy="60" r="1" fill="black" opacity="0.1"/>
      <circle cx="60" cy="70" r="1" fill="black" opacity="0.1"/>
      <circle cx="80" cy="55" r="1" fill="black" opacity="0.1"/>
      <circle cx="15" cy="80" r="1" fill="black" opacity="0.1"/>
      <circle cx="35" cy="90" r="1" fill="black" opacity="0.1"/>
      <circle cx="55" cy="85" r="1" fill="black" opacity="0.1"/>
      <circle cx="75" cy="95" r="1" fill="black" opacity="0.1"/>
      <circle cx="95" cy="75" r="1" fill="black" opacity="0.1"/>
    </pattern>
  </defs>
</svg>
